<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#1B2B3A">
<title>Hjemmetjenesten · Mo i Rana</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>

<style>
/* ── TOKENS ─────────────────────────────────────────────── */
:root {
  --navy:    #1B2B3A;
  --navy-lt: #263d52;
  --surface: #ffffff;
  --bg:      #F4F6F8;
  --txt:     #0f1923;
  --muted:   #6b7c8d;
  --border:  #dde2e8;
  --radius:  12px;
  --header-h: 52px;
  --dock-h:   56px;
  --shadow:   0 4px 20px rgba(0,0,0,0.12);
  --shadow-sm: 0 2px 8px rgba(0,0,0,0.10);
  font-family: 'DM Sans', system-ui, sans-serif;
}

/* ── RESET ───────────────────────────────────────────────── */
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
html, body { width:100%; height:100%; overflow:hidden; background:var(--navy); }

/* ── HEADER ─────────────────────────────────────────────── */
#header {
  position: fixed;
  top: 0; left: 0; right: 0;
  height: var(--header-h);
  background: var(--navy);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 16px;
  z-index: 1001;
  gap: 12px;
}
.app-title { display:flex; flex-direction:column; line-height:1.1; }
.app-name {
  font-size: 15px;
  font-weight: 700;
  color: #fff;
  letter-spacing: -0.2px;
}
.app-sub {
  font-size: 10px;
  font-weight: 400;
  color: rgba(255,255,255,0.55);
  letter-spacing: 0.4px;
}

#locate-btn {
  width: 38px; height: 38px;
  border-radius: 50%;
  background: rgba(255,255,255,0.10);
  border: 1px solid rgba(255,255,255,0.15);
  color: #fff;
  font-size: 17px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: background 0.15s;
  flex-shrink: 0;
}
#locate-btn:hover { background: rgba(255,255,255,0.20); }

#legend-toggle-btn {
  height: 34px;
  padding: 0 14px;
  border-radius: 17px;
  background: rgba(255,255,255,0.12);
  border: 1px solid rgba(255,255,255,0.18);
  color: #fff;
  font-family: 'DM Sans', sans-serif;
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  white-space: nowrap;
  transition: background 0.15s;
  flex-shrink: 0;
}
#legend-toggle-btn:hover { background: rgba(255,255,255,0.22); }

/* ── MAP ─────────────────────────────────────────────────── */
#map {
  position: fixed;
  top: var(--header-h);
  left: 0; right: 0;
  bottom: var(--dock-h);
}

/* ── ZONE DOCK ───────────────────────────────────────────── */
#zone-dock {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  height: var(--dock-h);
  background: var(--navy);
  border-top: 1px solid rgba(255,255,255,0.08);
  display: flex;
  align-items: center;
  padding: 0 12px;
  gap: 6px;
  overflow-x: auto;
  scrollbar-width: none;
  z-index: 1001;
}
#zone-dock::-webkit-scrollbar { display:none; }

.zone-pill {
  height: 32px;
  border-radius: 16px;
  border: 1.5px solid rgba(255,255,255,0.15);
  padding: 0 11px 0 8px;
  display: flex; align-items: center; gap: 6px;
  cursor: pointer;
  white-space: nowrap;
  font-size: 11.5px;
  font-weight: 600;
  color: #fff;
  transition: opacity 0.15s, transform 0.1s;
  flex-shrink: 0;
  user-select: none;
}
.zone-pill:hover { transform: scale(1.04); }
.zone-pill.inactive { opacity: 0.28; }

.zone-pill-dot {
  width: 9px; height: 9px;
  border-radius: 50%;
  flex-shrink: 0;
}

/* ── LEAFLET OVERRIDES ───────────────────────────────────── */
.leaflet-control-zoom {
  border: none !important;
  box-shadow: var(--shadow-sm) !important;
  border-radius: 10px !important;
  overflow: hidden;
  margin-right: 12px !important;
  margin-bottom: calc(var(--dock-h) + 12px) !important;
}
.leaflet-control-zoom a {
  width: 36px !important; height: 36px !important;
  line-height: 36px !important;
  font-size: 18px !important;
  color: var(--navy) !important;
  font-weight: 700 !important;
}
.leaflet-control-attribution {
  font-size: 9px !important;
  background: rgba(255,255,255,0.75) !important;
}
/* Custom popup */
.leaflet-popup-content-wrapper {
  border-radius: 10px !important;
  padding: 0 !important;
  overflow: hidden;
  box-shadow: var(--shadow) !important;
  min-width: 180px;
}
.leaflet-popup-content { margin: 0 !important; width: auto !important; }
.leaflet-popup-tip-container { margin-top: -1px; }

.popup-header {
  padding: 9px 14px 7px;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.5px;
  text-transform: uppercase;
  color: rgba(255,255,255,0.9);
}
.popup-body {
  padding: 10px 14px 12px;
  background: var(--surface);
}
.popup-num {
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  font-weight: 500;
  color: var(--muted);
  margin-bottom: 2px;
}
.popup-name {
  font-size: 14px;
  font-weight: 700;
  color: var(--txt);
  line-height: 1.25;
  margin-bottom: 5px;
}
.popup-addr {
  font-size: 12px;
  color: var(--muted);
  line-height: 1.35;
}

/* ── LEGEND PANEL ────────────────────────────────────────── */
#legend-panel {
  position: fixed;
  background: var(--surface);
  overflow: hidden;
  z-index: 1002;
  transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1),
              opacity 0.3s ease;
}

/* MOBILE: bottom sheet */
@media (max-width: 767px) {
  #legend-panel {
    left: 0; right: 0;
    bottom: var(--dock-h);
    border-radius: 16px 16px 0 0;
    max-height: 72vh;
    box-shadow: 0 -4px 24px rgba(0,0,0,0.16);
    transform: translateY(100%);
    opacity: 0;
  }
  #legend-panel.open {
    transform: translateY(0);
    opacity: 1;
  }
  .sheet-handle {
    display: flex;
    justify-content: center;
    padding: 10px 0 4px;
    cursor: grab;
  }
  .sheet-handle::before {
    content: '';
    width: 36px; height: 4px;
    background: var(--border);
    border-radius: 2px;
  }
}

/* DESKTOP: floating right card */
@media (min-width: 768px) {
  #legend-panel {
    top: calc(var(--header-h) + 12px);
    right: 12px;
    width: 290px;
    max-height: calc(100vh - var(--header-h) - var(--dock-h) - 24px);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    transform: translateX(calc(100% + 16px));
    opacity: 0;
  }
  #legend-panel.open {
    transform: translateX(0);
    opacity: 1;
  }
  .sheet-handle { display: none; }
}

#legend-inner {
  overflow-y: auto;
  max-height: calc(72vh - 40px);
  padding: 4px 0 20px;
  scrollbar-width: thin;
  scrollbar-color: var(--border) transparent;
}
@media (min-width: 768px) {
  #legend-inner {
    max-height: calc(100vh - var(--header-h) - var(--dock-h) - 24px - 40px);
  }
}

.legend-section-title {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.9px;
  text-transform: uppercase;
  color: var(--muted);
  padding: 12px 16px 6px;
}

.legend-zone-row {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px 16px;
  cursor: pointer;
  transition: background 0.1s, opacity 0.15s;
  user-select: none;
  border-radius: 6px;
  margin: 0 6px;
}
.legend-zone-row:hover { background: var(--bg); }
.legend-zone-row.inactive { opacity: 0.32; }

.legend-zone-swatch {
  width: 14px; height: 14px;
  border-radius: 3px;
  flex-shrink: 0;
  border: 1px solid rgba(0,0,0,0.12);
}
.legend-zone-name {
  font-size: 13px;
  font-weight: 600;
  color: var(--txt);
  flex: 1;
}
.legend-zone-hint {
  font-size: 10px;
  color: var(--muted);
  font-weight: 400;
}

.legend-divider {
  height: 1px;
  background: var(--border);
  margin: 8px 16px;
}

.legend-fac-row {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 7px 16px;
  cursor: pointer;
  transition: background 0.1s, opacity 0.15s;
  user-select: none;
  border-radius: 6px;
  margin: 0 6px;
}
.legend-fac-row:hover { background: var(--bg); }
.legend-fac-row.inactive { opacity: 0.32; }

.legend-fac-num {
  width: 22px; height: 22px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  font-weight: 500;
  color: #fff;
  flex-shrink: 0;
  border: 1.5px solid rgba(0,0,0,0.15);
}
.legend-fac-info { flex: 1; min-width: 0; }
.legend-fac-name {
  font-size: 12px;
  font-weight: 600;
  color: var(--txt);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.legend-fac-zone {
  font-size: 10.5px;
  color: var(--muted);
  margin-top: 1px;
}

/* ── OVERLAY ─────────────────────────────────────────────── */
#overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.35);
  z-index: 999;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.3s ease;
}
#overlay.show { opacity: 1; pointer-events: all; }

/* ── LOCATE PULSE ────────────────────────────────────────── */
.locate-pulse {
  width: 16px; height: 16px;
  border-radius: 50%;
  background: #3b82f6;
  border: 3px solid white;
  box-shadow: 0 0 0 4px rgba(59,130,246,0.3);
  animation: pulse 2s infinite;
}
@keyframes pulse {
  0%, 100% { box-shadow: 0 0 0 4px rgba(59,130,246,0.3); }
  50% { box-shadow: 0 0 0 8px rgba(59,130,246,0.1); }
}
</style>
</head>

<!-- HEADER -->
<header id="header">
  <div class="app-title">

    <span class="app-sub">Avdelingskart · Mo i Rana</span>

<div id="overlay" id="overlay"></div>

// ── MAP INIT ─────────────────────────────────────────────
const map = L.map('map', {
  zoomControl: true,
  scrollWheelZoom: true,
  tap: true
});
map.setView([66.318, 14.145], 12);

L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
  attribution: '© <a href="https://www.openstreetmap.org/copyright">OSM</a> © <a href="https://carto.com">CARTO</a>',
  subdomains: 'abcd', maxZoom: 19
}).addTo(map);

// ── STATE ─────────────────────────────────────────────────
const zoneLayers = {};
const facLayers  = {};
const zoneActive = {};
const facActive  = {};

// ── DRAW ZONES ────────────────────────────────────────────
ZONES.forEach(z => {
  const c = ZONE_COLORS[z.name];
  const poly = L.polygon(z.coords, {
    fillColor: c, color: z.name === 'Øst 1' ? '#ccc' : c,
    weight: 1.8, opacity: 0.85, fillOpacity: 0.28
  }).addTo(map);
  poly.bindPopup(`<div class="popup-header" style="background:${c}">${z.name}</div>`);
  zoneLayers[z.name] = poly;
  zoneActive[z.name] = true;
});

// ── DRAW FACILITY MARKERS ─────────────────────────────────
function makeMarkerIcon(f) {
  const c = ZONE_COLORS[f.zone];
  const isY = f.zone === 'Øst 1';
  const shadow = isY ? '-1px -1px 0 #555,1px -1px 0 #555,-1px 1px 0 #555,1px 1px 0 #555' : 'none';
  const sz = 26;
  return L.divIcon({
    html: `<div style="width:${sz}px;height:${sz}px;border-radius:50%;background:${c};
      display:flex;align-items:center;justify-content:center;
      font-family:'DM Mono',monospace;font-size:10px;font-weight:500;
      color:#fff;text-shadow:${shadow};
      border:2px solid ${isY?'#aaa':'rgba(0,0,0,0.18)'};
      box-shadow:0 2px 6px rgba(0,0,0,0.3);">${f.num}</div>`,
    className: '', iconSize: [sz,sz], iconAnchor: [sz/2,sz/2]
  });
}

FACILITIES.forEach(f => {
  const c = ZONE_COLORS[f.zone];
  const marker = L.marker([f.lat, f.lng], { icon: makeMarkerIcon(f) })
    .addTo(map)
    .bindPopup(`
      <div class="popup-header" style="background:${c}">${f.zone}</div>
      <div class="popup-body">
        <div class="popup-num">Nr. ${f.num}</div>
        <div class="popup-name">${f.name}</div>
        <div class="popup-addr">📍 ${f.addr}</div>
      </div>`);
  facLayers[f.num] = marker;
  facActive[f.num] = true;
});

// ── BUILD ZONE DOCK ───────────────────────────────────────
const dock = document.getElementById('zone-dock');
Object.entries(ZONE_COLORS).forEach(([name, color]) => {
  const pill = document.createElement('div');
  pill.className = 'zone-pill';
  pill.dataset.zone = name;
  pill.style.background = `${color}22`;
  pill.style.borderColor = `${color}66`;
  pill.innerHTML = `<span class="zone-pill-dot" style="background:${color}${name==='Øst 1'?';border:1px solid #bbb':''}"></span>${name}`;
  pill.addEventListener('click', () => toggleZone(name, pill));
  dock.appendChild(pill);
});

function toggleZone(name, pill) {
  zoneActive[name] = !zoneActive[name];
  if (zoneActive[name]) { map.addLayer(zoneLayers[name]); pill.classList.remove('inactive'); }
  else { map.removeLayer(zoneLayers[name]); pill.classList.add('inactive'); }
  // Sync legend row
  const row = document.querySelector(`.legend-zone-row[data-zone="${name}"]`);
  if (row) row.classList.toggle('inactive', !zoneActive[name]);
}

function toggleFac(num, el) {
  facActive[num] = !facActive[num];
  if (facActive[num]) { map.addLayer(facLayers[num]); el.classList.remove('inactive'); }
  else { map.removeLayer(facLayers[num]); el.classList.add('inactive'); }
}

// ── BUILD LEGEND ──────────────────────────────────────────
const legendZones = document.getElementById('legend-zones');
Object.entries(ZONE_COLORS).forEach(([name, color]) => {
  const row = document.createElement('div');
  row.className = 'legend-zone-row';
  row.dataset.zone = name;
  row.innerHTML = `
    <div class="legend-zone-swatch" style="background:${color};${name==='Øst 1'?'border-color:#bbb;':''}"></div>
    <span class="legend-zone-name">${name}</span>
    <span class="legend-zone-hint">Sone</span>`;
  row.addEventListener('click', () => {
    const pill = document.querySelector(`.zone-pill[data-zone="${name}"]`);
    toggleZone(name, pill);
  });
  legendZones.appendChild(row);
});

const legendFacs = document.getElementById('legend-facs');
FACILITIES.forEach(f => {
  const c = ZONE_COLORS[f.zone];
  const isY = f.zone === 'Øst 1';
  const shadow = isY ? '-1px -1px 0 #555,1px -1px 0 #555,-1px 1px 0 #555,1px 1px 0 #555' : 'none';
  const row = document.createElement('div');
  row.className = 'legend-fac-row';
  row.dataset.fac = f.num;
  row.innerHTML = `
    <div class="legend-fac-num" style="background:${c};${isY?'border-color:#aaa;':''}">
      <span style="text-shadow:${shadow}">${f.num}</span>
    </div>
    <div class="legend-fac-info">
      <div class="legend-fac-name">${f.name}</div>
      <div class="legend-fac-zone">${f.zone} · ${f.addr}</div>
    </div>`;
  row.addEventListener('click', () => toggleFac(f.num, row));
  legendFacs.appendChild(row);
});

// ── LEGEND PANEL TOGGLE ───────────────────────────────────
const panel   = document.getElementById('legend-panel');
const overlay = document.getElementById('overlay');

function openLegend() {
  panel.classList.add('open');
  overlay.classList.add('show');
}
function closeLegend() {
  panel.classList.remove('open');
  overlay.classList.remove('show');
}
function toggleLegend() {
  panel.classList.contains('open') ? closeLegend() : openLegend();
}

document.getElementById('legend-toggle-btn').addEventListener('click', toggleLegend);
overlay.addEventListener('click', closeLegend);

// On desktop: don't use overlay
const mqDesktop = window.matchMedia('(min-width: 768px)');
function handleMq(e) {
  if (e.matches) overlay.classList.remove('show');
}
mqDesktop.addEventListener('change', handleMq);

// ── LOCATE ME ────────────────────────────────────────────
document.getElementById('locate-btn').addEventListener('click', () => {
  if (!navigator.geolocation) return alert('Geolokasjon støttes ikke av denne nettleseren.');
  navigator.geolocation.getCurrentPosition(pos => {
    const { latitude: lat, longitude: lng } = pos.coords;
    const icon = L.divIcon({
      html: '<div class="locate-pulse"></div>',
      className: '', iconSize: [16,16], iconAnchor: [8,8]
    });
    L.marker([lat, lng], { icon }).addTo(map).bindPopup('📍 Din posisjon').openPopup();
    map.setView([lat, lng], 14);
  }, () => alert('Kunne ikke hente posisjon. Sjekk at nettleseren har tilgang.'));
});
</script>

</html>
